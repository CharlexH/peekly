<!DOCTYPE html>
<html lang="zh-CN" data-locale="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Peekly — 分析</title>
  <link rel="icon" href="data:,">
  <link rel="stylesheet" href="/style.css">
  <script src="/i18n.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.8/dist/cdn.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/topojson-client@3/dist/topojson-client.min.js"></script>
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
    }
  }
  </script>
</head>
<body x-data="app()" x-init="init()">

  <!-- Login Page -->
  <template x-if="!token">
    <div class="login-page">
      <div class="login-card">
        <h1>Peekly</h1>
        <p x-text="t('auth.description')"></p>
        <form @submit.prevent="login">
          <input type="password" x-model="password" :placeholder="t('auth.password')" autofocus>
          <button type="submit" :disabled="loggingIn" x-text="loggingIn ? t('auth.signingIn') : t('auth.signIn')"></button>
          <div class="login-error" x-show="loginError" x-text="loginError"></div>
        </form>
      </div>
    </div>
  </template>

  <!-- Dashboard -->
  <template x-if="token">
    <div class="app">
      <!-- Header -->
      <div class="header">
        <div class="header-left">
          <h1>Peekly</h1>
          <div class="realtime" x-show="mode === 'sites' && realtimeCount > 0">
            <span class="realtime-dot"></span>
            <span x-text="fmt(realtimeCount) + ' ' + t('nav.online')"></span>
          </div>
        </div>
        <div class="header-right">
          <div class="mode-switch">
            <button :class="{active: mode === 'sites'}" @click="setMode('sites')" x-text="t('nav.sites')"></button>
            <button :class="{active: mode === 'apps'}" @click="setMode('apps')" x-text="t('nav.apps')"></button>
          </div>
          <select x-show="mode === 'sites'" x-model="selectedSite" @change="fetchAll()">
            <template x-for="s in sites" :key="s.id">
              <option :value="s.id" x-text="s.name"></option>
            </template>
          </select>
          <select x-show="mode === 'apps'" x-model="selectedApp" @change="onAppChange()">
            <template x-for="a in apps" :key="a.id">
              <option :value="a.id" x-text="a.name"></option>
            </template>
          </select>
          <select x-show="mode === 'apps'" x-model="selectedAppEnvironment" @change="fetchAppOverview()">
            <template x-for="env in currentAppEnvironments" :key="env.id">
              <option :value="env.name" x-text="env.label"></option>
            </template>
          </select>
          <select x-model="period" @change="onPeriodChange()">
            <option value="today" x-text="t('period.today')"></option>
            <option value="7d" x-text="t('period.7d')"></option>
            <option value="30d" selected x-text="t('period.30d')"></option>
            <option value="90d" x-text="t('period.90d')"></option>
            <option value="custom" x-text="t('period.custom')"></option>
          </select>
          <div class="date-range-control" x-show="period === 'custom'">
            <input type="date" x-model="customStart" @change="onCustomRangeChange()">
            <span x-text="t('period.to')"></span>
            <input type="date" x-model="customEnd" @change="onCustomRangeChange()">
          </div>
          <button class="btn btn-sm" x-show="mode === 'sites'" @click="showSiteModal = true" x-text="t('action.addSite')"></button>
          <button class="btn btn-sm" x-show="mode === 'sites'" @click="toggleShare" x-text="currentShareToken ? t('action.unshare') : t('action.share')"></button>
          <div class="locale-switch">
            <button :class="{active: isLocale('zh')}" @click="setLocale('zh')" x-text="t('language.zh')"></button>
            <button :class="{active: isLocale('en')}" @click="setLocale('en')" x-text="t('language.en')"></button>
          </div>
          <button class="theme-toggle" @click="toggleTheme" :title="theme === 'dark' ? t('action.themeLight') : t('action.themeDark')" x-text="theme === 'dark' ? '\u2600\uFE0F' : '\uD83C\uDF19'"></button>
          <button class="logout-btn" @click="logout" x-text="t('nav.logout')"></button>
        </div>
      </div>

      <!-- Share link -->
      <div class="snippet share-bar" x-show="mode === 'sites' && currentShareToken">
        <span x-text="shareUrl" style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap"></span>
        <button class="btn btn-sm" @click="copyShare" x-text="t('action.copy')"></button>
      </div>

      <!-- App Ops -->
      <div class="app-ops" x-show="mode === 'apps'">
        <div class="ops-loading" x-show="appOpsLoading" x-text="t('status.loadingAppOps')"></div>
        <div class="ops-loading ops-error" x-show="appOpsError" x-text="appOpsError"></div>

        <template x-if="appOverview && !appOpsLoading">
          <div>
            <div class="ops-dashboard-grid">
              <section class="ops-block ops-business-block">
                <div class="ops-block-header">
                  <div>
                    <div class="ops-kicker" x-text="t('ops.businessSnapshot')"></div>
                    <h2 x-text="appOverview.app.name + ' / ' + appOverview.environment.label"></h2>
                    <p x-text="t('ops.window') + ': ' + rangeLabel(appOverview.range) + ' · ' + t('ops.lastSync') + ': ' + fmtSyncTime(appOpsLastSyncedAt)"></p>
                    <p class="ops-source-line" x-text="t('ops.source') + ': ' + appOverview.growth.source.active_subscribers + ' + ' + appOverview.growth.source.sales"></p>
                  </div>
                  <div class="ops-action-note primary">
                    <span x-text="t('ops.doFirst')"></span>
                    <strong x-text="tx(primaryAction().title)"></strong>
                    <p x-text="tx(primaryAction().body)"></p>
                  </div>
                </div>
                <div class="ops-kpi-grid ops-kpi-grid-business">
                  <div class="ops-kpi">
                    <span x-text="t('ops.appEvents')"></span>
                    <strong x-text="fmt(appOverview.behavior.events)"></strong>
                    <small x-text="t('ops.installsSessions', { installs: fmt(appOverview.behavior.installs), sessions: fmt(appOverview.behavior.sessions) })"></small>
                  </div>
                  <div class="ops-kpi">
                    <span x-text="t('ops.storyJobs')"></span>
                    <strong x-text="fmt(appOverview.ledger.generation.total)"></strong>
                    <small x-text="t('ops.storyJobsAckedFailed', { acked: fmt(appOverview.ledger.generation.acked), failed: fmt(appOverview.ledger.generation.failed) })"></small>
                  </div>
                  <div class="ops-kpi">
                    <span x-text="t('ops.firstStoryDone')"></span>
                    <strong x-text="fmt(funnelActual('first_story_completed'))"></strong>
                    <small x-text="t('ops.playback', { value: fmt(funnelActual('first_playback_completed')) })"></small>
                  </div>
                  <div class="ops-kpi">
                    <span x-text="t('ops.paywallViewed')"></span>
                    <strong x-text="fmt(funnelActual('paywall_viewed'))"></strong>
                    <small x-text="t('ops.planSelected', { value: fmt(funnelActual('plan_selected')) })"></small>
                  </div>
                  <div class="ops-kpi">
                    <span x-text="t('ops.purchaseSuccess')"></span>
                    <strong x-text="fmt(funnelActual('purchase_succeeded'))"></strong>
                    <small x-text="t('ops.purchaseStarted', { value: fmt(funnelActual('purchase_started')) })"></small>
                  </div>
                  <div class="ops-kpi">
                    <span x-text="t('ops.registeredUsers')"></span>
                    <strong x-text="fmt(appOverview.growth.target.actual_registered_users)"></strong>
                    <small x-text="t('ops.freeTrialExposure')"></small>
                  </div>
                </div>
              </section>

              <section class="ops-block ops-money-block">
                <div class="ops-block-header">
                  <div class="ops-money-summary">
                    <div>
                      <div class="ops-kicker" x-text="t('ops.moneySnapshot')"></div>
                      <h2 x-text="fmtCny(appOverview.growth.target.monthly_revenue_cny)"></h2>
                      <p x-text="t('ops.monthlyGrossSalesTarget')"></p>
                    </div>
                    <label class="ops-inline-input">
                      <span x-text="t('ops.target')"></span>
                      <input type="number" min="1" step="1000" x-model.number="growthTargetCny" @change="saveGrowthTarget()">
                    </label>
                  </div>
                  <div class="ops-action-note">
                    <span x-text="t('ops.costControl')"></span>
                    <strong x-text="costRiskTitle()"></strong>
                    <p x-text="costRiskBody()"></p>
                  </div>
                </div>
                <div class="ops-kpi-grid ops-kpi-grid-money">
                  <div class="ops-kpi">
                    <span x-text="t('ops.salesProgress')"></span>
                    <strong x-text="fmtRate(appOverview.growth.revenue.progress_percent)"></strong>
                    <small x-text="fmtCny(appOverview.growth.revenue.estimated_period_sales_cny) + ' / ' + fmtCny(appOverview.growth.target.period_revenue_cny)"></small>
                  </div>
                  <div class="ops-kpi">
                    <span x-text="t('ops.revenueGap')"></span>
                    <strong x-text="fmtCny(appOverview.growth.revenue.gap_cny)"></strong>
                    <small x-text="t('ops.ordersNeeded', { count: fmt(appOverview.growth.target.required_paid_orders) })"></small>
                  </div>
                  <div class="ops-kpi">
                    <span x-text="t('ops.activeMrr')"></span>
                    <strong x-text="fmtCny(appOverview.growth.revenue.active_subscriber_mrr_cny)"></strong>
                    <small x-text="t('ops.activeTarget', { active: fmt(appOverview.growth.revenue.active_subscribers.total), target: fmt(appOverview.growth.target.required_active_payers) })"></small>
                  </div>
                  <div class="ops-kpi">
                    <span x-text="t('ops.contribution')"></span>
                    <strong x-text="fmtCny(appOverview.growth.costs.estimated_period_contribution_cny)"></strong>
                    <small x-text="t('ops.afterCosts')"></small>
                  </div>
                  <div class="ops-kpi">
                    <span x-text="t('ops.aiCost')"></span>
                    <strong x-text="fmtCny(appOverview.growth.costs.actual_paid_ai_cost_cny)"></strong>
                    <small x-text="t('ops.targetScaleMonth', { value: fmtCny(appOverview.growth.costs.target_paid_ai_cost_cny) })"></small>
                  </div>
                  <div class="ops-kpi">
                    <span x-text="t('ops.trialExposure')"></span>
                    <strong x-text="fmtCny(appOverview.growth.costs.actual_free_trial_cost_cny)"></strong>
                    <small x-text="t('ops.budget', { value: fmtCny(appOverview.growth.costs.target_free_trial_cost_cny) })"></small>
                  </div>
                </div>
              </section>

              <section class="ops-block ops-funnel-block">
                <div class="ops-block-header">
                  <div>
                    <div class="ops-kicker" x-text="t('ops.conversionFunnel')"></div>
                    <h2 x-text="t('ops.revenueFunnel')"></h2>
                    <p x-text="t('ops.actualTarget', { actual: fmtRate(appOverview.growth.funnel.overall_conversion_percent), target: fmtRate(appOverview.growth.funnel.target_overall_conversion_percent) })"></p>
                  </div>
                  <div class="ops-action-note compact">
                    <span x-text="t('ops.currentBottleneck')"></span>
                    <strong x-text="bottleneckTitle()"></strong>
                    <p x-text="bottleneckBody()"></p>
                  </div>
                </div>
                <div class="ops-table-free-scroll">
                  <table class="growth-funnel-table">
                    <thead><tr><th x-text="t('ops.step')"></th><th x-text="t('ops.volumeProgress')"></th><th x-text="t('ops.gap')"></th><th x-text="t('ops.stepConversion')"></th></tr></thead>
                    <tbody>
                      <template x-for="(step, index) in appOverview.growth.funnel.steps" :key="step.id">
                        <tr>
                          <td>
                            <span class="growth-step" :class="funnelStatusClass(step.status)"></span>
                            <span x-text="tx(step.label)"></span>
                          </td>
                          <td>
                            <div class="funnel-progress-row">
                              <div class="funnel-progress-track">
                                <div class="funnel-progress-fill" :class="funnelStatusClass(step.status)" :style="'width:' + volumeProgressWidth(step) + '%'"></div>
                              </div>
                              <span x-text="volumeProgressLabel(step)"></span>
                            </div>
                          </td>
                          <td>
                            <span class="funnel-gap" :class="{zero: !step.count_gap}" x-text="volumeGapLabel(step)"></span>
                          </td>
                          <td>
                            <div class="funnel-progress-row">
                              <div class="funnel-progress-track">
                                <div class="funnel-progress-fill conversion" :class="conversionProgressClass(step, index)" :style="'width:' + conversionProgressWidth(step, index) + '%'"></div>
                              </div>
                              <span x-text="conversionProgressLabel(step, index)"></span>
                            </div>
                          </td>
                        </tr>
                      </template>
                    </tbody>
                  </table>
                </div>
                <div class="ops-focus-grid">
                  <div class="ops-alert-list">
                    <template x-for="item in appOverview.growth.recommendations" :key="item.title">
                      <div class="ops-alert" :class="severityClass(item.severity)">
                        <strong x-text="tx(item.title)"></strong>
                        <span x-text="tx(item.body)"></span>
                      </div>
                    </template>
                  </div>
                  <div class="growth-assumptions">
                    <span x-text="t('ops.monthlyPlan', { value: fmt(appOverview.growth.assumptions.monthlyPlanPriceCny) })"></span>
                    <span x-text="t('ops.yearlyPlan', { value: fmt(appOverview.growth.assumptions.yearlyPlanPriceCny) })"></span>
                    <span x-text="t('ops.paidAi', { value: fmt(appOverview.growth.assumptions.paidUserAiCostMonthlyCny) })"></span>
                    <span x-text="t('ops.trialCost', { value: fmt(appOverview.growth.assumptions.freeTrialCostPerRegisteredUserCny) })"></span>
                  </div>
                </div>
              </section>

              <section class="ops-block ops-health-block">
                <div class="ops-block-header">
                  <div>
                    <div class="ops-kicker" x-text="t('ops.systemHealth')"></div>
                    <h2 x-text="tx(appOverview.health.label)"></h2>
                    <p x-text="t('ops.costGate') + ' ' + burnCostLabel(appOverview.ledger.system.burn_cost_disabled) + ' · ' + rangeLabel(appOverview.range)"></p>
                  </div>
                  <div class="ops-status-pill" :class="statusClass(appOverview.health.status)">
                    <span x-text="tx(appOverview.health.label)"></span>
                    <small x-text="appOverview.environment.label"></small>
                  </div>
                </div>
                <div class="ops-kpi-grid ops-kpi-grid-health">
                  <div class="ops-kpi">
                    <span x-text="t('ops.success')"></span>
                    <strong x-text="fmtMaybe(appOverview.ledger.generation.success_rate, '%')"></strong>
                    <small x-text="t('ops.ackedJobs', { acked: fmt(appOverview.ledger.generation.acked), total: fmt(appOverview.ledger.generation.total) })"></small>
                  </div>
                  <div class="ops-kpi">
                    <span x-text="t('ops.genTime')"></span>
                    <strong x-text="fmtDuration((appOverview.ledger.generation.avg_text_seconds || 0) + (appOverview.ledger.generation.avg_tts_seconds || 0))"></strong>
                    <small x-text="t('ops.textTts', { text: fmtDuration(appOverview.ledger.generation.avg_text_seconds), tts: fmtDuration(appOverview.ledger.generation.avg_tts_seconds) })"></small>
                  </div>
                  <div class="ops-kpi">
                    <span x-text="t('ops.appQuota')"></span>
                    <strong x-text="fmtMaybe(appOverview.ledger.quota.remaining)"></strong>
                    <small x-text="t('ops.usedReserved', { used: fmtMaybe(appOverview.ledger.quota.used), reserved: fmtMaybe(appOverview.ledger.quota.reserved) })"></small>
                  </div>
                  <div class="ops-kpi">
                    <span x-text="t('ops.apiTokens')"></span>
                    <strong x-text="fmtMaybe(appOverview.ledger.provider.token_usage?.total_tokens)"></strong>
                    <small x-text="t('ops.textAttempts', { value: fmtMaybe(appOverview.ledger.provider.token_usage?.attempts) })"></small>
                  </div>
                  <div class="ops-kpi">
                    <span x-text="t('ops.failures')"></span>
                    <strong x-text="fmt(appOverview.ledger.provider.failed_attempts)"></strong>
                    <small x-text="t('ops.activeLeases', { value: fmt(appOverview.ledger.provider.active_leases) })"></small>
                  </div>
                  <div class="ops-kpi">
                    <span x-text="t('ops.balance')"></span>
                    <strong x-text="providerUsageLabel('account_available_balance')"></strong>
                    <small x-text="t('ops.latestSnapshot')"></small>
                  </div>
                </div>
                <div class="ops-health-stack">
                  <div class="ops-subsection">
                    <div class="ops-panel-header">
                      <div>
                        <h3 x-text="t('ops.generationTrend')"></h3>
                        <span x-text="t('ops.jobsAckedFailed', { range: rangeLabel(appOverview.range) })"></span>
                      </div>
                    </div>
                    <div class="ops-chart-wrap">
                      <canvas x-ref="appOpsChart"></canvas>
                    </div>
                    <div class="chart-legend">
                      <span><i class="legend-dot jobs"></i><span x-text="t('ops.jobs')"></span></span>
                      <span><i class="legend-dot acked"></i><span x-text="t('ops.acked')"></span></span>
                      <span><i class="legend-dot failed"></i><span x-text="t('ops.failed')"></span></span>
                    </div>
                    <div class="empty" x-show="!appOverview.ledger.timeline.length" x-text="t('ops.noGenerationJobs')"></div>
                  </div>

                  <div class="ops-subsection">
                    <div class="ops-panel-header">
                      <h3 x-text="t('ops.alerts')"></h3>
                      <span x-text="t('ops.computed', { count: fmt(appOverview.alerts.computed.length) })"></span>
                    </div>
                    <div class="ops-alert-list ops-scroll">
                      <template x-for="alert in appOverview.alerts.computed" :key="alert.title">
                        <div class="ops-alert" :class="severityClass(alert.severity)">
                          <strong x-text="tx(alert.title)"></strong>
                          <span x-text="tx(alert.body)"></span>
                        </div>
                      </template>
                      <div class="empty" x-show="appOverview.alerts.computed.length === 0" x-text="t('ops.noActiveAlerts')"></div>
                    </div>
                  </div>

                  <div class="ops-subsection">
                    <div class="ops-panel-header">
                      <h3 x-text="t('ops.providerAttempts')"></h3>
                      <span x-text="t('ops.failedCount', { count: fmt(appOverview.ledger.provider.failed_attempts) })"></span>
                    </div>
                    <div class="ops-table-scroll">
                      <table>
                        <thead><tr><th x-text="t('ops.kind')"></th><th x-text="t('ops.status')"></th><th x-text="t('ops.error')"></th><th x-text="t('table.count')"></th></tr></thead>
                        <tbody>
                          <template x-for="row in appOverview.ledger.provider.attempts" :key="row.kind + row.status + row.error_code">
                            <tr>
                              <td x-text="row.kind"></td>
                              <td x-text="row.status"></td>
                              <td x-text="row.error_code || '-'"></td>
                              <td x-text="fmt(row.count)"></td>
                            </tr>
                          </template>
                        </tbody>
                      </table>
                    </div>
                    <div class="empty" x-show="appOverview.ledger.provider.attempts.length === 0" x-text="t('ops.noProviderAttempts')"></div>
                  </div>

                  <div class="ops-subsection">
                    <div class="ops-panel-header">
                      <div>
                        <h3 x-text="t('ops.arkTokens')"></h3>
                        <span x-text="(appOverview.ledger.provider.token_usage?.available === false) ? t('ops.waitingMigration') : t('ops.textAttempts', { value: fmt(appOverview.ledger.provider.token_usage?.attempts || 0) })"></span>
                      </div>
                    </div>
                    <div class="ops-table-scroll">
                      <table>
                        <thead><tr><th x-text="t('ops.metric')"></th><th x-text="t('ops.tokens')"></th></tr></thead>
                        <tbody>
                          <tr><td x-text="t('ops.total')"></td><td x-text="fmt(appOverview.ledger.provider.token_usage?.total_tokens || 0)"></td></tr>
                          <tr><td x-text="t('ops.input')"></td><td x-text="fmt(appOverview.ledger.provider.token_usage?.input_tokens || 0)"></td></tr>
                          <tr><td x-text="t('ops.output')"></td><td x-text="fmt(appOverview.ledger.provider.token_usage?.output_tokens || 0)"></td></tr>
                          <tr><td x-text="t('ops.reasoning')"></td><td x-text="fmt(appOverview.ledger.provider.token_usage?.reasoning_tokens || 0)"></td></tr>
                          <tr><td x-text="t('ops.cachedInput')"></td><td x-text="fmt(appOverview.ledger.provider.token_usage?.cached_input_tokens || 0)"></td></tr>
                          <tr><td x-text="t('ops.avgAttempt')"></td><td x-text="fmtMaybe(appOverview.ledger.provider.token_usage?.avg_total_tokens_per_attempt)"></td></tr>
                        </tbody>
                      </table>
                      <table x-show="(appOverview.ledger.provider.token_usage?.models || []).length > 0">
                        <thead><tr><th x-text="t('ops.model')"></th><th x-text="t('ops.attempts')"></th><th x-text="t('ops.total')"></th><th x-text="t('ops.avg')"></th></tr></thead>
                        <tbody>
                          <template x-for="model in appOverview.ledger.provider.token_usage?.models || []" :key="(model.model_id || 'unknown') + (model.endpoint_id || '')">
                            <tr>
                              <td x-text="model.model_id || model.endpoint_id || 'unknown'"></td>
                              <td x-text="fmt(model.attempts)"></td>
                              <td x-text="fmt(model.total_tokens)"></td>
                              <td x-text="fmtMaybe(model.avg_total_tokens_per_attempt)"></td>
                            </tr>
                          </template>
                        </tbody>
                      </table>
                    </div>
                    <div class="empty" x-show="appOverview.ledger.provider.token_usage?.available === false" x-text="t('ops.tokenColumnsMissing')"></div>
                  </div>

                  <div class="ops-subsection">
                    <div class="ops-panel-header">
                      <div>
                        <h3 x-text="t('ops.volcengineUsage')"></h3>
                        <span x-text="t('ops.volcengineUsageDescription')"></span>
                      </div>
                      <button class="btn btn-sm" @click="syncVolcengineSnapshot" :disabled="providerSnapshotLoading" x-text="providerSnapshotLoading ? t('action.syncing') : t('action.sync')"></button>
                    </div>
                    <div class="ops-table-scroll">
                      <table>
                        <thead><tr><th x-text="t('ops.metric')"></th><th x-text="t('ops.value')"></th><th x-text="t('ops.window')"></th><th x-text="t('ops.updated')"></th></tr></thead>
                        <tbody>
                          <template x-for="row in appOverview.provider_usage" :key="row.provider + row.metric + row.captured_at">
                            <tr>
                              <td x-text="row.metric"></td>
                              <td x-text="fmtMaybe(row.value, row.unit ? ' ' + row.unit : '')"></td>
                              <td x-text="fmtProviderWindow(row)"></td>
                              <td x-text="fmtTime(row.captured_at ? new Date(row.captured_at * 1000).toISOString() : null)"></td>
                            </tr>
                          </template>
                        </tbody>
                      </table>
                    </div>
                    <div class="empty" x-show="appOverview.provider_usage.length === 0" x-text="t('ops.providerUsageEmpty')"></div>
                  </div>

                  <div class="ops-subsection">
                    <div class="ops-panel-header">
                      <div>
                        <h3 x-text="t('ops.volcengineLimits')"></h3>
                        <span x-text="t('ops.volcengineLimitsDescription')"></span>
                      </div>
                    </div>
                    <div class="ops-table-scroll">
                      <table>
                        <thead><tr><th x-text="t('ops.quota')"></th><th x-text="t('ops.peak')"></th><th x-text="t('ops.limit')"></th><th x-text="t('ops.headroom')"></th><th x-text="t('ops.updated')"></th></tr></thead>
                        <tbody>
                          <template x-for="row in appOverview.provider_quota" :key="row.provider + row.quota_type + row.captured_at">
                            <tr>
                              <td x-text="row.quota_type"></td>
                              <td x-text="fmtMaybe(row.used, row.unit ? ' ' + row.unit : '')"></td>
                              <td x-text="fmtMaybe(row.limit_value, row.unit ? ' ' + row.unit : '')"></td>
                              <td x-text="fmtMaybe(row.remaining, row.unit ? ' ' + row.unit : '')"></td>
                              <td x-text="fmtTime(row.captured_at ? new Date(row.captured_at * 1000).toISOString() : null)"></td>
                            </tr>
                          </template>
                        </tbody>
                      </table>
                    </div>
                    <div class="empty" x-show="appOverview.provider_quota.length === 0" x-text="t('ops.providerQuotaEmpty')"></div>
                  </div>

                  <div class="ops-subsection">
                    <div class="ops-panel-header">
                      <h3 x-text="t('ops.eventMix')"></h3>
                      <span x-text="t('ops.events', { count: fmt(appOverview.behavior.events) })"></span>
                    </div>
                    <div class="ops-table-scroll">
                      <table>
                        <thead><tr><th x-text="t('ops.event')"></th><th x-text="t('table.count')"></th><th x-text="t('ops.installs')"></th></tr></thead>
                        <tbody>
                          <template x-for="row in appOverview.behavior.top_events" :key="row.event_name">
                            <tr>
                              <td x-text="row.event_name"></td>
                              <td x-text="fmt(row.count)"></td>
                              <td x-text="fmtMaybe(row.installs)"></td>
                            </tr>
                          </template>
                        </tbody>
                      </table>
                    </div>
                    <div class="empty" x-show="appOverview.behavior.top_events.length === 0" x-text="t('ops.noAppEvents')"></div>
                  </div>
                </div>
              </section>
            </div>
          </div>
        </template>
      </div>

      <!-- Hero: Left Metrics + Globe + Right Sidebar -->
      <div class="hero" x-show="mode === 'sites'">
        <!-- Left Sidebar: 4 Metric Cards -->
        <div class="sidebar sidebar-left">
          <div class="sidebar-metric">
            <div class="sidebar-metric-header">
              <span class="label" x-text="t('metric.visitors')"></span>
              <span class="delta" :class="deltaClass(summary.compare?.visitors)" x-text="fmtDelta(summary.compare?.visitors)" x-show="summary.compare?.visitors != null"></span>
            </div>
            <div class="value accent" x-text="fmt(summary.visitors)"></div>
            <div class="sparkline-wrap"><canvas x-ref="sparkVisitors"></canvas></div>
          </div>
          <div class="sidebar-metric">
            <div class="sidebar-metric-header">
              <span class="label" x-text="t('metric.pageviews')"></span>
              <span class="delta" :class="deltaClass(summary.compare?.pageviews)" x-text="fmtDelta(summary.compare?.pageviews)" x-show="summary.compare?.pageviews != null"></span>
            </div>
            <div class="value" x-text="fmt(summary.pageviews)"></div>
            <div class="sparkline-wrap"><canvas x-ref="sparkPageviews"></canvas></div>
          </div>
          <div class="sidebar-metric">
            <div class="sidebar-metric-header">
              <span class="label" x-text="t('metric.avgDuration')"></span>
              <span class="delta" :class="deltaClass(summary.compare?.avg_duration)" x-text="fmtDelta(summary.compare?.avg_duration)" x-show="summary.compare?.avg_duration != null"></span>
            </div>
            <div class="value" x-text="fmtDuration(summary.avg_duration)"></div>
            <div class="sparkline-wrap"><canvas x-ref="sparkDuration"></canvas></div>
          </div>
          <div class="sidebar-metric sidebar-metric-compact">
            <div class="sidebar-metric-header">
              <span class="label" x-text="t('metric.bounceRate')"></span>
              <span class="delta" :class="deltaClass(summary.compare?.bounce_rate, true)" x-text="fmtDelta(summary.compare?.bounce_rate)" x-show="summary.compare?.bounce_rate != null"></span>
            </div>
            <div class="value" x-text="summary.bounce_rate + '%'"></div>
          </div>
        </div>

        <!-- 3D Globe -->
        <div class="globe-container" x-ref="globeContainer">
          <!-- Globe HUD overlay -->
          <div class="globe-hud" x-show="realtimeCount > 0">
            <div class="globe-hud-count" x-text="realtimeCount"></div>
            <div class="globe-hud-label" x-text="t('metric.activeVisitors')"></div>
          </div>
        </div>

        <!-- Right Sidebar: Traffic + Top Pages -->
        <div class="sidebar sidebar-right">
          <div class="sidebar-chart">
            <div class="sidebar-chart-title" x-text="t('metric.traffic')"></div>
            <div class="sidebar-chart-container">
              <canvas x-ref="chart"></canvas>
            </div>
          </div>
          <div class="sidebar-section">
            <div class="sidebar-section-title" x-text="t('table.topPages')"></div>
            <template x-for="p in pages.slice(0, 8)" :key="p.path">
              <div class="sidebar-row">
                <span class="sidebar-row-label" x-text="p.path"></span>
                <span class="sidebar-row-value" x-text="fmt(p.views)"></span>
              </div>
            </template>
            <div class="sidebar-empty" x-show="pages.length === 0" x-text="t('table.noData')"></div>
          </div>
        </div>
      </div>

      <!-- Tables -->
      <div class="tables-grid" x-show="mode === 'sites'">
        <!-- Pages -->
        <div class="table-card">
          <h3 x-text="t('table.topPages')"></h3>
          <table>
            <thead><tr><th x-text="t('table.page')"></th><th x-text="t('table.views')"></th></tr></thead>
            <tbody>
              <template x-for="p in pages" :key="p.path">
                <tr>
                  <td class="bar-cell">
                    <div class="bar-bg" :style="'width:' + pct(p.views, pages) + '%'"></div>
                    <span class="bar-text" x-text="p.path"></span>
                  </td>
                  <td x-text="fmt(p.views)"></td>
                </tr>
              </template>
            </tbody>
          </table>
          <div class="empty" x-show="pages.length === 0" x-text="t('table.noDataYet')"></div>
        </div>

        <!-- Referrers -->
        <div class="table-card">
          <h3 x-text="t('table.sources')"></h3>
          <table>
            <thead><tr><th x-text="t('table.referrer')"></th><th x-text="t('table.views')"></th></tr></thead>
            <tbody>
              <template x-for="r in referrers" :key="r.source">
                <tr>
                  <td class="bar-cell">
                    <div class="bar-bg" :style="'width:' + pct(r.views, referrers) + '%'"></div>
                    <span class="bar-text" x-text="r.source"></span>
                  </td>
                  <td x-text="fmt(r.views)"></td>
                </tr>
              </template>
            </tbody>
          </table>
          <div class="empty" x-show="referrers.length === 0" x-text="t('table.noDataYet')"></div>
        </div>

        <!-- Countries -->
        <div class="table-card">
          <h3 x-text="t('table.countries')"></h3>
          <table>
            <thead><tr><th x-text="t('table.country')"></th><th x-text="t('metric.visitors')"></th></tr></thead>
            <tbody>
              <template x-for="c in countries" :key="c.country">
                <tr>
                  <td class="bar-cell">
                    <div class="bar-bg" :style="'width:' + pct(c.visitors, countries, 'visitors') + '%'"></div>
                    <span class="bar-text" x-text="c.country"></span>
                  </td>
                  <td x-text="fmt(c.visitors)"></td>
                </tr>
              </template>
            </tbody>
          </table>
          <div class="empty" x-show="countries.length === 0" x-text="t('table.noDataYet')"></div>
        </div>

        <!-- Browsers -->
        <div class="table-card">
          <h3 x-text="t('table.browsers')"></h3>
          <table>
            <thead><tr><th x-text="t('table.browser')"></th><th x-text="t('table.count')"></th></tr></thead>
            <tbody>
              <template x-for="b in browsers" :key="b.name">
                <tr>
                  <td class="bar-cell">
                    <div class="bar-bg" :style="'width:' + pct(b.count, browsers, 'count') + '%'"></div>
                    <span class="bar-text" x-text="b.name"></span>
                  </td>
                  <td x-text="fmt(b.count)"></td>
                </tr>
              </template>
            </tbody>
          </table>
          <div class="empty" x-show="browsers.length === 0" x-text="t('table.noDataYet')"></div>
        </div>

        <!-- OS -->
        <div class="table-card">
          <h3 x-text="t('table.operatingSystems')"></h3>
          <table>
            <thead><tr><th x-text="t('table.os')"></th><th x-text="t('table.count')"></th></tr></thead>
            <tbody>
              <template x-for="o in osData" :key="o.name">
                <tr>
                  <td class="bar-cell">
                    <div class="bar-bg" :style="'width:' + pct(o.count, osData, 'count') + '%'"></div>
                    <span class="bar-text" x-text="o.name"></span>
                  </td>
                  <td x-text="fmt(o.count)"></td>
                </tr>
              </template>
            </tbody>
          </table>
          <div class="empty" x-show="osData.length === 0" x-text="t('table.noDataYet')"></div>
        </div>

        <!-- Devices -->
        <div class="table-card">
          <h3 x-text="t('table.devices')"></h3>
          <table>
            <thead><tr><th x-text="t('table.type')"></th><th x-text="t('table.count')"></th></tr></thead>
            <tbody>
              <template x-for="d in devices" :key="d.device">
                <tr>
                  <td class="bar-cell">
                    <div class="bar-bg" :style="'width:' + pct(d.count, devices, 'count') + '%'"></div>
                    <span class="bar-text" x-text="d.device"></span>
                  </td>
                  <td x-text="fmt(d.count)"></td>
                </tr>
              </template>
            </tbody>
          </table>
          <div class="empty" x-show="devices.length === 0" x-text="t('table.noDataYet')"></div>
        </div>

        <!-- UTM Sources -->
        <div class="table-card" x-show="utmSources.length > 0">
          <h3 x-text="t('table.utmSources')"></h3>
          <table>
            <thead><tr><th x-text="t('table.source')"></th><th x-text="t('metric.visitors')"></th></tr></thead>
            <tbody>
              <template x-for="u in utmSources" :key="u.name">
                <tr>
                  <td class="bar-cell">
                    <div class="bar-bg" :style="'width:' + pct(u.visitors, utmSources, 'visitors') + '%'"></div>
                    <span class="bar-text" x-text="u.name"></span>
                  </td>
                  <td x-text="fmt(u.visitors)"></td>
                </tr>
              </template>
            </tbody>
          </table>
        </div>

        <!-- UTM Campaigns -->
        <div class="table-card" x-show="utmCampaigns.length > 0">
          <h3 x-text="t('table.utmCampaigns')"></h3>
          <table>
            <thead><tr><th x-text="t('table.campaign')"></th><th x-text="t('metric.visitors')"></th></tr></thead>
            <tbody>
              <template x-for="u in utmCampaigns" :key="u.name">
                <tr>
                  <td class="bar-cell">
                    <div class="bar-bg" :style="'width:' + pct(u.visitors, utmCampaigns, 'visitors') + '%'"></div>
                    <span class="bar-text" x-text="u.name"></span>
                  </td>
                  <td x-text="fmt(u.visitors)"></td>
                </tr>
              </template>
            </tbody>
          </table>
        </div>

        <!-- Entry Pages -->
        <div class="table-card">
          <h3 x-text="t('table.entryPages')"></h3>
          <table>
            <thead><tr><th x-text="t('table.page')"></th><th x-text="t('table.entries')"></th></tr></thead>
            <tbody>
              <template x-for="p in entryPages" :key="p.path">
                <tr>
                  <td class="bar-cell">
                    <div class="bar-bg" :style="'width:' + pct(p.entries, entryPages, 'entries') + '%'"></div>
                    <span class="bar-text" x-text="p.path"></span>
                  </td>
                  <td x-text="fmt(p.entries)"></td>
                </tr>
              </template>
            </tbody>
          </table>
          <div class="empty" x-show="entryPages.length === 0" x-text="t('table.noDataYet')"></div>
        </div>

        <!-- Exit Pages -->
        <div class="table-card">
          <h3 x-text="t('table.exitPages')"></h3>
          <table>
            <thead><tr><th x-text="t('table.page')"></th><th x-text="t('table.exits')"></th></tr></thead>
            <tbody>
              <template x-for="p in exitPages" :key="p.path">
                <tr>
                  <td class="bar-cell">
                    <div class="bar-bg" :style="'width:' + pct(p.exits, exitPages, 'exits') + '%'"></div>
                    <span class="bar-text" x-text="p.path"></span>
                  </td>
                  <td x-text="fmt(p.exits)"></td>
                </tr>
              </template>
            </tbody>
          </table>
          <div class="empty" x-show="exitPages.length === 0" x-text="t('table.noDataYet')"></div>
        </div>
      </div>

      <!-- Funnels -->
      <div class="funnels-section" x-show="mode === 'sites'">
        <div class="funnels-header">
          <h3 x-text="t('funnels.title')"></h3>
          <button class="btn btn-sm" @click="showFunnelModal = true" x-text="t('action.addFunnel')"></button>
        </div>
        <div x-show="funnels.length === 0" class="empty" x-text="t('funnels.empty')"></div>
        <div class="funnels-grid">
          <template x-for="(f, fi) in funnels" :key="f.id">
            <div class="funnel-card">
              <div class="funnel-card-header">
                <span class="funnel-card-name" x-text="f.name"></span>
                <div style="display:flex;align-items:center;gap:8px">
                  <span class="funnel-overall-badge" x-text="(f.overall || 0) + '%'"></span>
                  <button class="funnel-delete" @click="deleteFunnel(f.id)" :title="t('action.delete')">&times;</button>
                </div>
              </div>
              <div class="funnel-canvas-wrap">
                <canvas class="funnel-canvas" :data-funnel-idx="fi"></canvas>
              </div>
            </div>
          </template>
        </div>
      </div>

      <!-- Create Funnel Modal -->
      <template x-if="showFunnelModal && mode === 'sites'">
        <div class="modal-overlay" @click.self="showFunnelModal = false">
          <div class="modal" style="max-width:500px">
            <h3 x-text="t('funnels.create')"></h3>
            <input type="text" x-model="newFunnelName" :placeholder="t('funnels.namePlaceholder')">
            <template x-for="(step, idx) in newFunnelSteps" :key="idx">
              <div style="display:flex;gap:8px;margin-bottom:8px;align-items:center">
                <span style="font-size:12px;color:var(--text-dim);width:20px" x-text="(idx+1) + '.'"></span>
                <input type="text" x-model="step.name" :placeholder="t('funnels.stepName')" style="flex:1;margin-bottom:0">
                <select x-model="step.match_type" style="width:120px">
                  <option value="path" x-text="t('funnels.pathExact')"></option>
                  <option value="starts_with" x-text="t('funnels.pathPrefix')"></option>
                  <option value="event" x-text="t('funnels.event')"></option>
                  <option value="event_meta" x-text="t('funnels.eventMeta')"></option>
                </select>
                <input type="text" x-model="step.match_value" :placeholder="step.match_type === 'path' ? '/about/' : step.match_type === 'starts_with' ? '/works/' : step.match_type === 'event' ? 'signup_click' : 'outbound::url::resume'" style="flex:1;margin-bottom:0">
                <button class="btn btn-sm btn-danger" @click="newFunnelSteps.splice(idx, 1)" x-show="newFunnelSteps.length > 2">x</button>
              </div>
            </template>
            <button class="btn btn-sm" @click="newFunnelSteps.push({name:'',match_type:'path',match_value:''})" style="margin-top:4px" x-text="t('action.addStep')"></button>
            <div class="modal-actions">
              <button class="btn" @click="showFunnelModal = false" x-text="t('action.cancel')"></button>
              <button class="btn btn-accent" @click="createFunnel" :disabled="!newFunnelName || newFunnelSteps.some(s => !s.name || !s.match_value)" x-text="t('action.create')"></button>
            </div>
          </div>
        </div>
      </template>

      <!-- Add Site Modal -->
      <template x-if="showSiteModal && mode === 'sites'">
        <div class="modal-overlay" @click.self="showSiteModal = false">
          <div class="modal">
            <h3 x-text="t('site.add')"></h3>
            <input type="text" x-model="newSiteName" :placeholder="t('site.namePlaceholder')">
            <input type="text" x-model="newSiteDomain" :placeholder="t('site.domainPlaceholder')">
            <div class="modal-actions">
              <button class="btn" @click="showSiteModal = false" x-text="t('action.cancel')"></button>
              <button class="btn btn-accent" @click="addSite" :disabled="!newSiteName || !newSiteDomain" x-text="t('action.add')"></button>
            </div>
            <template x-if="newSiteSnippet">
              <div style="margin-top:16px">
                <div style="font-size:12px;color:var(--text-dim);margin-bottom:4px" x-text="t('site.trackingSnippet')"></div>
                <div class="snippet" x-text="newSiteSnippet"></div>
              </div>
            </template>
          </div>
        </div>
      </template>
    </div>
  </template>

  <script src="/app.js"></script>
</body>
</html>

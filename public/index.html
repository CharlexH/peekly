<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Peekly — Analytics</title>
  <link rel="icon" href="data:,">
  <link rel="stylesheet" href="/style.css">
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.8/dist/cdn.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/topojson-client@3/dist/topojson-client.min.js"></script>
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
    }
  }
  </script>
</head>
<body x-data="app()" x-init="init()">

  <!-- Login Page -->
  <template x-if="!token">
    <div class="login-page">
      <div class="login-card">
        <h1>Peekly</h1>
        <p>Enter your password to access analytics.</p>
        <form @submit.prevent="login">
          <input type="password" x-model="password" placeholder="Password" autofocus>
          <button type="submit" :disabled="loggingIn" x-text="loggingIn ? 'Signing in...' : 'Sign in'"></button>
          <div class="login-error" x-show="loginError" x-text="loginError"></div>
        </form>
      </div>
    </div>
  </template>

  <!-- Dashboard -->
  <template x-if="token">
    <div class="app">
      <!-- Header -->
      <div class="header">
        <div class="header-left">
          <h1>Peekly</h1>
          <div class="realtime" x-show="mode === 'sites' && realtimeCount > 0">
            <span class="realtime-dot"></span>
            <span x-text="realtimeCount + ' online'"></span>
          </div>
        </div>
        <div class="header-right">
          <div class="mode-switch">
            <button :class="{active: mode === 'sites'}" @click="setMode('sites')">Sites</button>
            <button :class="{active: mode === 'apps'}" @click="setMode('apps')">Apps</button>
          </div>
          <select x-show="mode === 'sites'" x-model="selectedSite" @change="fetchAll()">
            <template x-for="s in sites" :key="s.id">
              <option :value="s.id" x-text="s.name"></option>
            </template>
          </select>
          <select x-show="mode === 'apps'" x-model="selectedApp" @change="onAppChange()">
            <template x-for="a in apps" :key="a.id">
              <option :value="a.id" x-text="a.name"></option>
            </template>
          </select>
          <select x-show="mode === 'apps'" x-model="selectedAppEnvironment" @change="fetchAppOverview()">
            <template x-for="env in currentAppEnvironments" :key="env.id">
              <option :value="env.name" x-text="env.label"></option>
            </template>
          </select>
          <select x-model="period" @change="onPeriodChange()">
            <option value="today">Today</option>
            <option value="7d">7d</option>
            <option value="30d" selected>30d</option>
            <option value="90d">90d</option>
            <option value="custom">Custom</option>
          </select>
          <div class="date-range-control" x-show="period === 'custom'">
            <input type="date" x-model="customStart" @change="onCustomRangeChange()">
            <span>to</span>
            <input type="date" x-model="customEnd" @change="onCustomRangeChange()">
          </div>
          <button class="btn btn-sm" x-show="mode === 'sites'" @click="showSiteModal = true">+ Site</button>
          <button class="btn btn-sm" x-show="mode === 'sites'" @click="toggleShare" x-text="currentShareToken ? 'Unshare' : 'Share'"></button>
          <button class="theme-toggle" @click="toggleTheme" x-text="theme === 'dark' ? '\u2600\uFE0F' : '\uD83C\uDF19'"></button>
          <button class="logout-btn" @click="logout">Logout</button>
        </div>
      </div>

      <!-- Share link -->
      <div class="snippet share-bar" x-show="mode === 'sites' && currentShareToken">
        <span x-text="shareUrl" style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap"></span>
        <button class="btn btn-sm" @click="copyShare">Copy</button>
      </div>

      <!-- App Ops -->
      <div class="app-ops" x-show="mode === 'apps'">
        <div class="ops-loading" x-show="appOpsLoading">Loading App Ops...</div>
        <div class="ops-loading ops-error" x-show="appOpsError" x-text="appOpsError"></div>

        <template x-if="appOverview && !appOpsLoading">
          <div>
            <div class="ops-page-head">
              <div>
                <div class="ops-kicker">Operating Summary</div>
                <h2 x-text="appOverview.app.name + ' / ' + appOverview.environment.label"></h2>
                <p x-text="'Window: ' + rangeLabel(appOverview.range) + ' · Source: ' + appOverview.growth.source.active_subscribers + ' + ' + appOverview.growth.source.sales"></p>
              </div>
              <div class="ops-status-pill" :class="statusClass(appOverview.health.status)">
                <span x-text="appOverview.health.label"></span>
                <small x-text="'Cost gate ' + burnCostLabel(appOverview.ledger.system.burn_cost_disabled)"></small>
              </div>
            </div>

            <div class="ops-decision-grid">
              <div class="ops-decision-card primary">
                <span class="ops-kicker">Do this first</span>
                <strong x-text="primaryAction().title"></strong>
                <p x-text="primaryAction().body"></p>
              </div>
              <div class="ops-decision-card">
                <span class="ops-kicker">Current bottleneck</span>
                <strong x-text="bottleneckTitle()"></strong>
                <p x-text="bottleneckBody()"></p>
              </div>
              <div class="ops-decision-card">
                <span class="ops-kicker">Cost control</span>
                <strong x-text="costRiskTitle()"></strong>
                <p x-text="costRiskBody()"></p>
              </div>
            </div>

            <div class="ops-hero">
              <div class="ops-status-card" :class="statusClass(appOverview.health.status)">
                <div class="ops-kicker">App Health</div>
                <div class="ops-status-title" x-text="appOverview.health.label"></div>
                <div class="ops-status-meta">
                  <span x-text="appOverview.app.name"></span>
                  <span x-text="appOverview.environment.label"></span>
                  <span x-text="'Cost gate ' + burnCostLabel(appOverview.ledger.system.burn_cost_disabled)"></span>
                </div>
              </div>

              <div class="ops-metrics">
                <div class="ops-metric">
                  <span class="label">Generation Success</span>
                  <strong x-text="fmtMaybe(appOverview.ledger.generation.success_rate, '%')"></strong>
                  <small x-text="fmt(appOverview.ledger.generation.acked) + ' acked / ' + fmt(appOverview.ledger.generation.total) + ' jobs'"></small>
                </div>
                <div class="ops-metric">
                  <span class="label">Generation Time</span>
                  <strong x-text="fmtDuration((appOverview.ledger.generation.avg_text_seconds || 0) + (appOverview.ledger.generation.avg_tts_seconds || 0))"></strong>
                  <small x-text="'Text ' + fmtDuration(appOverview.ledger.generation.avg_text_seconds) + ' · TTS ' + fmtDuration(appOverview.ledger.generation.avg_tts_seconds)"></small>
                </div>
                <div class="ops-metric">
                  <span class="label">App Quota</span>
                  <strong x-text="fmtMaybe(appOverview.ledger.quota.remaining)"></strong>
                  <small x-text="'Used ' + fmtMaybe(appOverview.ledger.quota.used) + ' · Reserved ' + fmtMaybe(appOverview.ledger.quota.reserved)"></small>
                </div>
                <div class="ops-metric">
                  <span class="label">App Events</span>
                  <strong x-text="fmt(appOverview.behavior.events)"></strong>
                  <small x-text="fmt(appOverview.behavior.installs) + ' installs · ' + fmt(appOverview.behavior.sessions) + ' sessions'"></small>
                </div>
              </div>
            </div>

            <div class="growth-board" x-show="appOverview.growth">
              <div class="growth-target-panel">
                <div>
                  <div class="ops-kicker">North Star</div>
                  <div class="growth-target-title">
                    <span x-text="fmtCny(appOverview.growth.target.monthly_revenue_cny)"></span>
                    <small>/ month gross sales</small>
                  </div>
                  <div class="ops-status-meta">
                    <span x-text="'Window target ' + fmtCny(appOverview.growth.target.period_revenue_cny)"></span>
                    <span x-text="'ASC sales reports ' + appOverview.growth.source.asc_sales_reports"></span>
                    <span x-text="'ARPU ' + fmtCny(appOverview.growth.target.weighted_monthly_arpu_cny, 2)"></span>
                  </div>
                </div>
                <label class="growth-target-input">
                  <span>Monthly target</span>
                  <input type="number" min="1" step="1000" x-model.number="growthTargetCny" @change="saveGrowthTarget()">
                </label>
              </div>

              <div class="ops-metrics growth-metrics">
                <div class="ops-metric">
                  <span class="label">Sales Progress</span>
                  <strong x-text="fmtRate(appOverview.growth.revenue.progress_percent)"></strong>
                  <small x-text="fmtCny(appOverview.growth.revenue.estimated_period_sales_cny) + ' estimated / ' + fmtCny(appOverview.growth.target.period_revenue_cny)"></small>
                </div>
                <div class="ops-metric">
                  <span class="label">Revenue Gap</span>
                  <strong x-text="fmtCny(appOverview.growth.revenue.gap_cny)"></strong>
                  <small x-text="fmt(appOverview.growth.target.required_paid_orders) + ' paid orders needed in this window'"></small>
                </div>
                <div class="ops-metric">
                  <span class="label">Active MRR</span>
                  <strong x-text="fmtCny(appOverview.growth.revenue.active_subscriber_mrr_cny)"></strong>
                  <small x-text="fmt(appOverview.growth.revenue.active_subscribers.total) + ' active · target ' + fmt(appOverview.growth.target.required_active_payers)"></small>
                </div>
                <div class="ops-metric">
                  <span class="label">AI Cost</span>
                  <strong x-text="fmtCny(appOverview.growth.costs.actual_paid_ai_cost_cny)"></strong>
                  <small x-text="'Target scale ' + fmtCny(appOverview.growth.costs.target_paid_ai_cost_cny) + ' / month'"></small>
                </div>
                <div class="ops-metric">
                  <span class="label">Trial Exposure</span>
                  <strong x-text="fmtCny(appOverview.growth.costs.actual_free_trial_cost_cny)"></strong>
                  <small x-text="fmt(appOverview.growth.target.actual_registered_users) + ' registered · target budget ' + fmtCny(appOverview.growth.costs.target_free_trial_cost_cny)"></small>
                </div>
                <div class="ops-metric">
                  <span class="label">Contribution</span>
                  <strong x-text="fmtCny(appOverview.growth.costs.estimated_period_contribution_cny)"></strong>
                  <small>After Apple estimate, paid AI, and trial cost</small>
                </div>
              </div>

              <div class="growth-grid">
                <div class="ops-panel ops-panel-wide">
                  <div class="ops-panel-header">
                    <div>
                      <h3>Revenue Funnel</h3>
                      <span x-text="'Actual ' + fmtRate(appOverview.growth.funnel.overall_conversion_percent) + ' · target ' + fmtRate(appOverview.growth.funnel.target_overall_conversion_percent)"></span>
                    </div>
                  </div>
                  <table class="growth-funnel-table">
                    <thead><tr><th>Step</th><th>Volume progress</th><th>Gap</th><th>Step conversion</th></tr></thead>
                    <tbody>
                      <template x-for="(step, index) in appOverview.growth.funnel.steps" :key="step.id">
                        <tr>
                          <td>
                            <span class="growth-step" :class="funnelStatusClass(step.status)"></span>
                            <span x-text="step.label"></span>
                          </td>
                          <td>
                            <div class="funnel-progress-row">
                              <div class="funnel-progress-track">
                                <div class="funnel-progress-fill" :class="funnelStatusClass(step.status)" :style="'width:' + volumeProgressWidth(step) + '%'"></div>
                              </div>
                              <span x-text="volumeProgressLabel(step)"></span>
                            </div>
                          </td>
                          <td>
                            <span class="funnel-gap" :class="{zero: !step.count_gap}" x-text="volumeGapLabel(step)"></span>
                          </td>
                          <td>
                            <div class="funnel-progress-row">
                              <div class="funnel-progress-track">
                                <div class="funnel-progress-fill conversion" :class="conversionProgressClass(step, index)" :style="'width:' + conversionProgressWidth(step, index) + '%'"></div>
                              </div>
                              <span x-text="conversionProgressLabel(step, index)"></span>
                            </div>
                          </td>
                        </tr>
                      </template>
                    </tbody>
                  </table>
                </div>

                <div class="ops-panel">
                  <div class="ops-panel-header">
                    <h3>Today’s Focus</h3>
                    <span>growth actions</span>
                  </div>
                  <div class="ops-alert-list">
                    <template x-for="item in appOverview.growth.recommendations" :key="item.title">
                      <div class="ops-alert" :class="severityClass(item.severity)">
                        <strong x-text="item.title"></strong>
                        <span x-text="item.body"></span>
                      </div>
                    </template>
                  </div>
                  <div class="growth-assumptions">
                    <span x-text="'Monthly ¥' + fmt(appOverview.growth.assumptions.monthlyPlanPriceCny)"></span>
                    <span x-text="'Yearly ¥' + fmt(appOverview.growth.assumptions.yearlyPlanPriceCny)"></span>
                    <span x-text="'Paid AI ¥' + fmt(appOverview.growth.assumptions.paidUserAiCostMonthlyCny) + '/user/mo'"></span>
                    <span x-text="'Trial ¥' + fmt(appOverview.growth.assumptions.freeTrialCostPerRegisteredUserCny) + '/registered'"></span>
                  </div>
                </div>
              </div>
            </div>

            <div class="ops-section-head">
              <h3>Cost, Reliability, and Raw Signals</h3>
              <span>provider spend, generation health, and instrumentation detail</span>
            </div>

            <div class="ops-grid">
              <div class="ops-panel ops-panel-wide">
                <div class="ops-panel-header">
                  <div>
                    <h3>Generation Trend</h3>
                    <span x-text="'jobs / acked / failed · ' + rangeLabel(appOverview.range)"></span>
                  </div>
                </div>
                <div class="ops-chart-wrap">
                  <canvas x-ref="appOpsChart"></canvas>
                </div>
                <div class="chart-legend">
                  <span><i class="legend-dot jobs"></i>Jobs</span>
                  <span><i class="legend-dot acked"></i>Acked</span>
                  <span><i class="legend-dot failed"></i>Failed</span>
                </div>
                <div class="empty" x-show="!appOverview.ledger.timeline.length">No generation jobs in this period</div>
              </div>

              <div class="ops-panel">
                <div class="ops-panel-header">
                  <h3>Alerts</h3>
                  <span x-text="appOverview.alerts.computed.length + ' computed'"></span>
                </div>
                <div class="ops-alert-list ops-scroll">
                  <template x-for="alert in appOverview.alerts.computed" :key="alert.title">
                    <div class="ops-alert" :class="severityClass(alert.severity)">
                      <strong x-text="alert.title"></strong>
                      <span x-text="alert.body"></span>
                    </div>
                  </template>
                  <div class="empty" x-show="appOverview.alerts.computed.length === 0">No active alerts</div>
                </div>
              </div>

              <div class="ops-panel">
                <div class="ops-panel-header">
                  <h3>Provider Attempts</h3>
                  <span x-text="fmt(appOverview.ledger.provider.failed_attempts) + ' failed'"></span>
                </div>
                <div class="ops-table-scroll">
                  <table>
                    <thead><tr><th>Kind</th><th>Status</th><th>Error</th><th>Count</th></tr></thead>
                    <tbody>
                      <template x-for="row in appOverview.ledger.provider.attempts" :key="row.kind + row.status + row.error_code">
                        <tr>
                          <td x-text="row.kind"></td>
                          <td x-text="row.status"></td>
                          <td x-text="row.error_code || '-'"></td>
                          <td x-text="fmt(row.count)"></td>
                        </tr>
                      </template>
                    </tbody>
                  </table>
                </div>
                <div class="empty" x-show="appOverview.ledger.provider.attempts.length === 0">No provider attempts in this period</div>
              </div>

              <div class="ops-panel">
                <div class="ops-panel-header">
                  <div>
                    <h3>Ark Tokens</h3>
                    <span x-text="(appOverview.ledger.provider.token_usage?.available === false) ? 'waiting for migration' : fmt(appOverview.ledger.provider.token_usage?.attempts || 0) + ' text attempts'"></span>
                  </div>
                </div>
                <div class="ops-table-scroll">
                  <table>
                    <thead><tr><th>Metric</th><th>Tokens</th></tr></thead>
                    <tbody>
                      <tr><td>Total</td><td x-text="fmt(appOverview.ledger.provider.token_usage?.total_tokens || 0)"></td></tr>
                      <tr><td>Input</td><td x-text="fmt(appOverview.ledger.provider.token_usage?.input_tokens || 0)"></td></tr>
                      <tr><td>Output</td><td x-text="fmt(appOverview.ledger.provider.token_usage?.output_tokens || 0)"></td></tr>
                      <tr><td>Reasoning</td><td x-text="fmt(appOverview.ledger.provider.token_usage?.reasoning_tokens || 0)"></td></tr>
                      <tr><td>Cached input</td><td x-text="fmt(appOverview.ledger.provider.token_usage?.cached_input_tokens || 0)"></td></tr>
                      <tr><td>Avg / attempt</td><td x-text="fmtMaybe(appOverview.ledger.provider.token_usage?.avg_total_tokens_per_attempt)"></td></tr>
                    </tbody>
                  </table>
                  <table x-show="(appOverview.ledger.provider.token_usage?.models || []).length > 0">
                    <thead><tr><th>Model</th><th>Attempts</th><th>Total</th><th>Avg</th></tr></thead>
                    <tbody>
                      <template x-for="model in appOverview.ledger.provider.token_usage?.models || []" :key="(model.model_id || 'unknown') + (model.endpoint_id || '')">
                        <tr>
                          <td x-text="model.model_id || model.endpoint_id || 'unknown'"></td>
                          <td x-text="fmt(model.attempts)"></td>
                          <td x-text="fmt(model.total_tokens)"></td>
                          <td x-text="fmtMaybe(model.avg_total_tokens_per_attempt)"></td>
                        </tr>
                      </template>
                    </tbody>
                  </table>
                </div>
                <div class="empty" x-show="appOverview.ledger.provider.token_usage?.available === false">Nians ledger token columns are not deployed yet</div>
              </div>

              <div class="ops-panel">
                <div class="ops-panel-header">
                  <div>
                    <h3>Volcengine Cost & Usage</h3>
                    <span>balance, monthly bills, and speech usage snapshots</span>
                  </div>
                  <button class="btn btn-sm" @click="syncVolcengineSnapshot" :disabled="providerSnapshotLoading" x-text="providerSnapshotLoading ? 'Syncing' : 'Sync'"></button>
                </div>
                <div class="ops-table-scroll">
                  <table>
                    <thead><tr><th>Metric</th><th>Value</th><th>Window</th><th>Updated</th></tr></thead>
                    <tbody>
                      <template x-for="row in appOverview.provider_usage" :key="row.provider + row.metric + row.captured_at">
                        <tr>
                          <td x-text="row.metric"></td>
                          <td x-text="fmtMaybe(row.value, row.unit ? ' ' + row.unit : '')"></td>
                          <td x-text="fmtProviderWindow(row)"></td>
                          <td x-text="fmtTime(row.captured_at ? new Date(row.captured_at * 1000).toISOString() : null)"></td>
                        </tr>
                      </template>
                    </tbody>
                  </table>
                </div>
                <div class="empty" x-show="appOverview.provider_usage.length === 0">Volcengine balance and usage snapshots are not connected yet</div>
              </div>

              <div class="ops-panel">
                <div class="ops-panel-header">
                  <div>
                    <h3>Volcengine Provider Limits</h3>
                    <span>speech concurrency / qps quota signals</span>
                  </div>
                </div>
                <div class="ops-table-scroll">
                  <table>
                    <thead><tr><th>Quota</th><th>Peak</th><th>Limit</th><th>Headroom</th><th>Updated</th></tr></thead>
                    <tbody>
                      <template x-for="row in appOverview.provider_quota" :key="row.provider + row.quota_type + row.captured_at">
                        <tr>
                          <td x-text="row.quota_type"></td>
                          <td x-text="fmtMaybe(row.used, row.unit ? ' ' + row.unit : '')"></td>
                          <td x-text="fmtMaybe(row.limit_value, row.unit ? ' ' + row.unit : '')"></td>
                          <td x-text="fmtMaybe(row.remaining, row.unit ? ' ' + row.unit : '')"></td>
                          <td x-text="fmtTime(row.captured_at ? new Date(row.captured_at * 1000).toISOString() : null)"></td>
                        </tr>
                      </template>
                    </tbody>
                  </table>
                </div>
                <div class="empty" x-show="appOverview.provider_quota.length === 0">Speech provider limit snapshots need VOLCENGINE_SPEECH_APP_ID</div>
              </div>

              <div class="ops-panel ops-panel-wide">
                <div class="ops-panel-header">
                  <h3>Event Mix</h3>
                  <span x-text="fmt(appOverview.behavior.events) + ' events'"></span>
                </div>
                <div class="ops-table-scroll">
                  <table>
                    <thead><tr><th>Event</th><th>Count</th><th>Installs</th></tr></thead>
                    <tbody>
                      <template x-for="row in appOverview.behavior.top_events" :key="row.event_name">
                        <tr>
                          <td x-text="row.event_name"></td>
                          <td x-text="fmt(row.count)"></td>
                          <td x-text="fmtMaybe(row.installs)"></td>
                        </tr>
                      </template>
                    </tbody>
                  </table>
                </div>
                <div class="empty" x-show="appOverview.behavior.top_events.length === 0">No app events in this period</div>
              </div>
            </div>
          </div>
        </template>
      </div>

      <!-- Hero: Left Metrics + Globe + Right Sidebar -->
      <div class="hero" x-show="mode === 'sites'">
        <!-- Left Sidebar: 4 Metric Cards -->
        <div class="sidebar sidebar-left">
          <div class="sidebar-metric">
            <div class="sidebar-metric-header">
              <span class="label">Visitors</span>
              <span class="delta" :class="deltaClass(summary.compare?.visitors)" x-text="fmtDelta(summary.compare?.visitors)" x-show="summary.compare?.visitors != null"></span>
            </div>
            <div class="value accent" x-text="fmt(summary.visitors)"></div>
            <div class="sparkline-wrap"><canvas x-ref="sparkVisitors"></canvas></div>
          </div>
          <div class="sidebar-metric">
            <div class="sidebar-metric-header">
              <span class="label">Pageviews</span>
              <span class="delta" :class="deltaClass(summary.compare?.pageviews)" x-text="fmtDelta(summary.compare?.pageviews)" x-show="summary.compare?.pageviews != null"></span>
            </div>
            <div class="value" x-text="fmt(summary.pageviews)"></div>
            <div class="sparkline-wrap"><canvas x-ref="sparkPageviews"></canvas></div>
          </div>
          <div class="sidebar-metric">
            <div class="sidebar-metric-header">
              <span class="label">Avg. Duration</span>
              <span class="delta" :class="deltaClass(summary.compare?.avg_duration)" x-text="fmtDelta(summary.compare?.avg_duration)" x-show="summary.compare?.avg_duration != null"></span>
            </div>
            <div class="value" x-text="fmtDuration(summary.avg_duration)"></div>
            <div class="sparkline-wrap"><canvas x-ref="sparkDuration"></canvas></div>
          </div>
          <div class="sidebar-metric sidebar-metric-compact">
            <div class="sidebar-metric-header">
              <span class="label">Bounce</span>
              <span class="delta" :class="deltaClass(summary.compare?.bounce_rate, true)" x-text="fmtDelta(summary.compare?.bounce_rate)" x-show="summary.compare?.bounce_rate != null"></span>
            </div>
            <div class="value" x-text="summary.bounce_rate + '%'"></div>
          </div>
        </div>

        <!-- 3D Globe -->
        <div class="globe-container" x-ref="globeContainer">
          <!-- Globe HUD overlay -->
          <div class="globe-hud" x-show="realtimeCount > 0">
            <div class="globe-hud-count" x-text="realtimeCount"></div>
            <div class="globe-hud-label">active visitors</div>
          </div>
        </div>

        <!-- Right Sidebar: Traffic + Top Pages -->
        <div class="sidebar sidebar-right">
          <div class="sidebar-chart">
            <div class="sidebar-chart-title">Traffic</div>
            <div class="sidebar-chart-container">
              <canvas x-ref="chart"></canvas>
            </div>
          </div>
          <div class="sidebar-section">
            <div class="sidebar-section-title">Top Pages</div>
            <template x-for="p in pages.slice(0, 8)" :key="p.path">
              <div class="sidebar-row">
                <span class="sidebar-row-label" x-text="p.path"></span>
                <span class="sidebar-row-value" x-text="fmt(p.views)"></span>
              </div>
            </template>
            <div class="sidebar-empty" x-show="pages.length === 0">No data</div>
          </div>
        </div>
      </div>

      <!-- Tables -->
      <div class="tables-grid" x-show="mode === 'sites'">
        <!-- Pages -->
        <div class="table-card">
          <h3>Top Pages</h3>
          <table>
            <thead><tr><th>Page</th><th>Views</th></tr></thead>
            <tbody>
              <template x-for="p in pages" :key="p.path">
                <tr>
                  <td class="bar-cell">
                    <div class="bar-bg" :style="'width:' + pct(p.views, pages) + '%'"></div>
                    <span class="bar-text" x-text="p.path"></span>
                  </td>
                  <td x-text="fmt(p.views)"></td>
                </tr>
              </template>
            </tbody>
          </table>
          <div class="empty" x-show="pages.length === 0">No data yet</div>
        </div>

        <!-- Referrers -->
        <div class="table-card">
          <h3>Sources</h3>
          <table>
            <thead><tr><th>Referrer</th><th>Views</th></tr></thead>
            <tbody>
              <template x-for="r in referrers" :key="r.source">
                <tr>
                  <td class="bar-cell">
                    <div class="bar-bg" :style="'width:' + pct(r.views, referrers) + '%'"></div>
                    <span class="bar-text" x-text="r.source"></span>
                  </td>
                  <td x-text="fmt(r.views)"></td>
                </tr>
              </template>
            </tbody>
          </table>
          <div class="empty" x-show="referrers.length === 0">No data yet</div>
        </div>

        <!-- Countries -->
        <div class="table-card">
          <h3>Countries</h3>
          <table>
            <thead><tr><th>Country</th><th>Visitors</th></tr></thead>
            <tbody>
              <template x-for="c in countries" :key="c.country">
                <tr>
                  <td class="bar-cell">
                    <div class="bar-bg" :style="'width:' + pct(c.visitors, countries, 'visitors') + '%'"></div>
                    <span class="bar-text" x-text="c.country"></span>
                  </td>
                  <td x-text="fmt(c.visitors)"></td>
                </tr>
              </template>
            </tbody>
          </table>
          <div class="empty" x-show="countries.length === 0">No data yet</div>
        </div>

        <!-- Browsers -->
        <div class="table-card">
          <h3>Browsers</h3>
          <table>
            <thead><tr><th>Browser</th><th>Count</th></tr></thead>
            <tbody>
              <template x-for="b in browsers" :key="b.name">
                <tr>
                  <td class="bar-cell">
                    <div class="bar-bg" :style="'width:' + pct(b.count, browsers, 'count') + '%'"></div>
                    <span class="bar-text" x-text="b.name"></span>
                  </td>
                  <td x-text="fmt(b.count)"></td>
                </tr>
              </template>
            </tbody>
          </table>
          <div class="empty" x-show="browsers.length === 0">No data yet</div>
        </div>

        <!-- OS -->
        <div class="table-card">
          <h3>Operating Systems</h3>
          <table>
            <thead><tr><th>OS</th><th>Count</th></tr></thead>
            <tbody>
              <template x-for="o in osData" :key="o.name">
                <tr>
                  <td class="bar-cell">
                    <div class="bar-bg" :style="'width:' + pct(o.count, osData, 'count') + '%'"></div>
                    <span class="bar-text" x-text="o.name"></span>
                  </td>
                  <td x-text="fmt(o.count)"></td>
                </tr>
              </template>
            </tbody>
          </table>
          <div class="empty" x-show="osData.length === 0">No data yet</div>
        </div>

        <!-- Devices -->
        <div class="table-card">
          <h3>Devices</h3>
          <table>
            <thead><tr><th>Type</th><th>Count</th></tr></thead>
            <tbody>
              <template x-for="d in devices" :key="d.device">
                <tr>
                  <td class="bar-cell">
                    <div class="bar-bg" :style="'width:' + pct(d.count, devices, 'count') + '%'"></div>
                    <span class="bar-text" x-text="d.device"></span>
                  </td>
                  <td x-text="fmt(d.count)"></td>
                </tr>
              </template>
            </tbody>
          </table>
          <div class="empty" x-show="devices.length === 0">No data yet</div>
        </div>

        <!-- UTM Sources -->
        <div class="table-card" x-show="utmSources.length > 0">
          <h3>UTM Sources</h3>
          <table>
            <thead><tr><th>Source</th><th>Visitors</th></tr></thead>
            <tbody>
              <template x-for="u in utmSources" :key="u.name">
                <tr>
                  <td class="bar-cell">
                    <div class="bar-bg" :style="'width:' + pct(u.visitors, utmSources, 'visitors') + '%'"></div>
                    <span class="bar-text" x-text="u.name"></span>
                  </td>
                  <td x-text="fmt(u.visitors)"></td>
                </tr>
              </template>
            </tbody>
          </table>
        </div>

        <!-- UTM Campaigns -->
        <div class="table-card" x-show="utmCampaigns.length > 0">
          <h3>UTM Campaigns</h3>
          <table>
            <thead><tr><th>Campaign</th><th>Visitors</th></tr></thead>
            <tbody>
              <template x-for="u in utmCampaigns" :key="u.name">
                <tr>
                  <td class="bar-cell">
                    <div class="bar-bg" :style="'width:' + pct(u.visitors, utmCampaigns, 'visitors') + '%'"></div>
                    <span class="bar-text" x-text="u.name"></span>
                  </td>
                  <td x-text="fmt(u.visitors)"></td>
                </tr>
              </template>
            </tbody>
          </table>
        </div>

        <!-- Entry Pages -->
        <div class="table-card">
          <h3>Entry Pages</h3>
          <table>
            <thead><tr><th>Page</th><th>Entries</th></tr></thead>
            <tbody>
              <template x-for="p in entryPages" :key="p.path">
                <tr>
                  <td class="bar-cell">
                    <div class="bar-bg" :style="'width:' + pct(p.entries, entryPages, 'entries') + '%'"></div>
                    <span class="bar-text" x-text="p.path"></span>
                  </td>
                  <td x-text="fmt(p.entries)"></td>
                </tr>
              </template>
            </tbody>
          </table>
          <div class="empty" x-show="entryPages.length === 0">No data yet</div>
        </div>

        <!-- Exit Pages -->
        <div class="table-card">
          <h3>Exit Pages</h3>
          <table>
            <thead><tr><th>Page</th><th>Exits</th></tr></thead>
            <tbody>
              <template x-for="p in exitPages" :key="p.path">
                <tr>
                  <td class="bar-cell">
                    <div class="bar-bg" :style="'width:' + pct(p.exits, exitPages, 'exits') + '%'"></div>
                    <span class="bar-text" x-text="p.path"></span>
                  </td>
                  <td x-text="fmt(p.exits)"></td>
                </tr>
              </template>
            </tbody>
          </table>
          <div class="empty" x-show="exitPages.length === 0">No data yet</div>
        </div>
      </div>

      <!-- Funnels -->
      <div class="funnels-section" x-show="mode === 'sites'">
        <div class="funnels-header">
          <h3>Funnels</h3>
          <button class="btn btn-sm" @click="showFunnelModal = true">+ Funnel</button>
        </div>
        <div x-show="funnels.length === 0" class="empty">No funnels yet. Create one to track conversions.</div>
        <div class="funnels-grid">
          <template x-for="(f, fi) in funnels" :key="f.id">
            <div class="funnel-card">
              <div class="funnel-card-header">
                <span class="funnel-card-name" x-text="f.name"></span>
                <div style="display:flex;align-items:center;gap:8px">
                  <span class="funnel-overall-badge" x-text="(f.overall || 0) + '%'"></span>
                  <button class="funnel-delete" @click="deleteFunnel(f.id)" title="Delete">&times;</button>
                </div>
              </div>
              <div class="funnel-canvas-wrap">
                <canvas class="funnel-canvas" :data-funnel-idx="fi"></canvas>
              </div>
            </div>
          </template>
        </div>
      </div>

      <!-- Create Funnel Modal -->
      <template x-if="showFunnelModal && mode === 'sites'">
        <div class="modal-overlay" @click.self="showFunnelModal = false">
          <div class="modal" style="max-width:500px">
            <h3>Create Funnel</h3>
            <input type="text" x-model="newFunnelName" placeholder="Funnel name (e.g., Signup Flow)">
            <template x-for="(step, idx) in newFunnelSteps" :key="idx">
              <div style="display:flex;gap:8px;margin-bottom:8px;align-items:center">
                <span style="font-size:12px;color:var(--text-dim);width:20px" x-text="(idx+1) + '.'"></span>
                <input type="text" x-model="step.name" placeholder="Step name" style="flex:1;margin-bottom:0">
                <select x-model="step.match_type" style="width:120px">
                  <option value="path">Path (exact)</option>
                  <option value="starts_with">Path (prefix)</option>
                  <option value="event">Event</option>
                  <option value="event_meta">Event + Meta</option>
                </select>
                <input type="text" x-model="step.match_value" :placeholder="step.match_type === 'path' ? '/about/' : step.match_type === 'starts_with' ? '/works/' : step.match_type === 'event' ? 'signup_click' : 'outbound::url::resume'" style="flex:1;margin-bottom:0">
                <button class="btn btn-sm btn-danger" @click="newFunnelSteps.splice(idx, 1)" x-show="newFunnelSteps.length > 2">x</button>
              </div>
            </template>
            <button class="btn btn-sm" @click="newFunnelSteps.push({name:'',match_type:'path',match_value:''})" style="margin-top:4px">+ Step</button>
            <div class="modal-actions">
              <button class="btn" @click="showFunnelModal = false">Cancel</button>
              <button class="btn btn-accent" @click="createFunnel" :disabled="!newFunnelName || newFunnelSteps.some(s => !s.name || !s.match_value)">Create</button>
            </div>
          </div>
        </div>
      </template>

      <!-- Add Site Modal -->
      <template x-if="showSiteModal && mode === 'sites'">
        <div class="modal-overlay" @click.self="showSiteModal = false">
          <div class="modal">
            <h3>Add Site</h3>
            <input type="text" x-model="newSiteName" placeholder="Site name (e.g., My Blog)">
            <input type="text" x-model="newSiteDomain" placeholder="Domain (e.g., myblog.com)">
            <div class="modal-actions">
              <button class="btn" @click="showSiteModal = false">Cancel</button>
              <button class="btn btn-accent" @click="addSite" :disabled="!newSiteName || !newSiteDomain">Add</button>
            </div>
            <template x-if="newSiteSnippet">
              <div style="margin-top:16px">
                <div style="font-size:12px;color:var(--text-dim);margin-bottom:4px">Tracking snippet:</div>
                <div class="snippet" x-text="newSiteSnippet"></div>
              </div>
            </template>
          </div>
        </div>
      </template>
    </div>
  </template>

  <script src="/app.js"></script>
</body>
</html>
